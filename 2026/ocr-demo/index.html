<body>
<h2>PP-OCRv6 WebGL OCR</h2>
<div id="status">초기화 중...</div>
<input type="file" id="fileInput" accept="image/*" disabled>
<div class="canvas-wrap"><canvas id="canvas"></canvas></div>
<div id="results"></div>
<pre id="log"></pre>
<canvas id="glCanvas" width="1" height="1" style="display:none"></canvas>

<script>
'use strict';
const USE_CONV1X1=true, USE_DW_CONV=true, USE_GPU_MATMUL=true;
const DET_MAX_SIDE=960, DET_THRESH=0.2, DET_BOX_THRESH=0.45, DET_UNCLIP_RATIO=1.4;
const REC_HEIGHT=48, REC_TARGET_WIDTH=320;
const DET_MEAN=[.485,.456,.406], DET_STD=[.229,.224,.225];

const statusEl=document.getElementById('status');
const logEl=document.getElementById('log');
function log(s){logEl.textContent+=s+'\n'; logEl.scrollTop=logEl.scrollHeight;}
function setStatus(s){statusEl.textContent=s;}

// ============ WebGL SETUP ============
const glCanvas=document.getElementById('glCanvas');
const gl=glCanvas.getContext('webgl2',{antialias:false,premultipliedAlpha:false});
if(!gl){setStatus('WebGL2 not supported');throw new Error('no webgl2');}
const extFloat=gl.getExtension('EXT_color_buffer_float');
if(!extFloat){setStatus('EXT_color_buffer_float not supported');throw new Error('no float fbo');}
gl.getExtension('OES_texture_float_linear');

const fbo=gl.createFramebuffer();

// Fullscreen quad VAO
const quadVAO=gl.createVertexArray();
gl.bindVertexArray(quadVAO);
const quadBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);
gl.bindVertexArray(null);

// ============ FLOAT16 CONVERSION ============
const _cvtBuf=new ArrayBuffer(4),_cvtF32=new Float32Array(_cvtBuf),_cvtU32=new Uint32Array(_cvtBuf);
function f32ToF16(f32){
  const u16=new Uint16Array(f32.length);
  for(let i=0;i<f32.length;i++){
    _cvtF32[0]=f32[i];const b=_cvtU32[0];
    const s=(b>>16)&0x8000,e=((b>>23)&0xff)-112,m=(b>>13)&0x3ff;
    u16[i]=e<=0?s:e>=31?s|0x7c00:s|(e<<10)|m;
  }
  return u16;
}
function f16ToF32(u16){
  const f32=new Float32Array(u16.length);
  for(let i=0;i<u16.length;i++){
    const h=u16[i],s=(h&0x8000)<<16,e=(h>>10)&0x1f,m=h&0x3ff;
    _cvtU32[0]=e===0?s:e===31?s|0x7f800000|(m<<13):s|((e+112)<<23)|(m<<13);
    f32[i]=_cvtF32[0];
  }
  return f32;
}

// ============ TEXTURE UTILS ============
function makeTex(w,h,data){
  const t=gl.createTexture();
  gl.activeTexture(gl.TEXTURE15);
  gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  if(data instanceof Uint16Array)
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.HALF_FLOAT,data);
  else if(data)
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.HALF_FLOAT,f32ToF16(data));
  else
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.HALF_FLOAT,null);
  gl.bindTexture(gl.TEXTURE_2D,null);
  return t;
}
function readTex(tex,w,h){
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  const u16=new Uint16Array(w*h*4);
  gl.readPixels(0,0,w,h,gl.RGBA,gl.HALF_FLOAT,u16);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  return f16ToF32(u16);
}
function freeTex(t){if(t){gl.deleteTexture(t);}}

const texPool=new Map();
function makeOutTex(w,h){
  const key=w+','+h;
  const bucket=texPool.get(key);
  if(bucket&&bucket.length>0)return bucket.pop();
  return makeTex(w,h,null);
}
function recycleTex(t,w,h){
  if(!t)return;
  const key=w+','+h;
  let bucket=texPool.get(key);
  if(!bucket){bucket=[];texPool.set(key,bucket);}
  if(bucket.length<32)bucket.push(t); else gl.deleteTexture(t);
}

// Spatial tensor: shape [C,H,W] stored as texture [W, H*CG] RGBA
// CG = ceil(C/4), texel (x, sy*CG+cg) = 4 channels at spatial (x,sy), channel group cg
function spatialTexSize(C,H,W){return [W, H*Math.ceil(C/4)];}

function cpuToSpatialTex(data,C,H,W){
  const CG=Math.ceil(C/4);
  const tW=W, tH=H*CG;
  const buf=new Float32Array(tW*tH*4);
  for(let c=0;c<C;c++){
    const cg=c>>2, cs=c&3;
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        buf[((y*CG+cg)*tW+x)*4+cs] = data[c*H*W+y*W+x];
      }
    }
  }
  return makeTex(tW,tH,buf);
}

function spatialTexToCpu(tex,C,H,W){
  const CG=Math.ceil(C/4);
  const tW=W, tH=H*CG;
  const raw=readTex(tex,tW,tH);
  const out=new Float32Array(C*H*W);
  for(let c=0;c<C;c++){
    const cg=c>>2, cs=c&3;
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        out[c*H*W+y*W+x] = raw[((y*CG+cg)*tW+x)*4+cs];
      }
    }
  }
  return out;
}

// Weight texture: flat RGBA16F packing all model weights
function makeWeightTex(f16Buf){
  const u16=new Uint16Array(f16Buf);
  const nTexels=Math.ceil(u16.length/4);
  const texW=Math.min(nTexels,4096);
  const texH=Math.ceil(nTexels/texW);
  const padded=new Uint16Array(texW*texH*4);
  padded.set(u16);
  const tex=makeTex(texW,texH,padded);
  return {tex,texW};
}

// Small [C] vector -> [1, CG] texture
function vecToTex(data,C){
  const CG=Math.ceil(C/4);
  const buf=new Float32Array(CG*4);
  buf.set(data.subarray(0,C));
  return makeTex(1,CG,buf);
}

// ============ SHADERS ============
const VS=`#version 300 es
in vec2 a_pos;
void main(){gl_Position=vec4(a_pos,0,1);}`;

const FS_CONV=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_wt;
uniform int u_iC,u_oC,u_iH,u_iW,u_kH,u_kW,u_sH,u_sW,u_pH,u_pW,u_grp,u_iCG,u_oCG,u_wB,u_wTW;
out vec4 fc;
float rw(int i){i+=u_wB;int t=i>>2,c=i&3;vec4 v=texelFetch(u_wt,ivec2(t%u_wTW,t/u_wTW),0);return c==0?v.r:c==1?v.g:c==2?v.b:v.a;}
void main(){
  int ox=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int oy=fy/u_oCG,ocg=fy-oy*u_oCG,oc0=ocg*4;
  vec4 s=vec4(0);
  if(u_grp==u_iC&&u_grp==u_oC){
    for(int ky=0;ky<u_kH;ky++){int iy=oy*u_sH+ky-u_pH;if(iy<0||iy>=u_iH)continue;
    for(int kx=0;kx<u_kW;kx++){int ix=ox*u_sW+kx-u_pW;if(ix<0||ix>=u_iW)continue;
      vec4 inp=texelFetch(u_inp,ivec2(ix,iy*u_iCG+ocg),0);
      for(int q=0;q<4;q++){int oc=oc0+q;if(oc>=u_oC)break;s[q]+=inp[q]*rw(oc*u_kH*u_kW+ky*u_kW+kx);}
    }}
  } else {
    int opg=u_oC/u_grp,ipg=u_iC/u_grp;
    for(int q=0;q<4;q++){int oc=oc0+q;if(oc>=u_oC)break;
      int g=oc/opg,ist=g*ipg;float a=0.0;
      for(int ky=0;ky<u_kH;ky++){int iy=oy*u_sH+ky-u_pH;if(iy<0||iy>=u_iH)continue;
      for(int kx=0;kx<u_kW;kx++){int ix=ox*u_sW+kx-u_pW;if(ix<0||ix>=u_iW)continue;
      for(int ic=ist;ic<ist+ipg;ic++){
        int icg=ic>>2,ics=ic&3;
        vec4 inp=texelFetch(u_inp,ivec2(ix,iy*u_iCG+icg),0);
        float iv=ics==0?inp.r:ics==1?inp.g:ics==2?inp.b:inp.a;
        a+=iv*rw(((oc*ipg+(ic-ist))*u_kH+ky)*u_kW+kx);
      }}}
      s[q]=a;
    }
  }
  fc=s;
}`;

const FS_ELEM=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_i0,u_i1;
uniform float u_sc,u_al,u_be;
uniform int u_mode;
out vec4 fc;
void main(){
  ivec2 c=ivec2(gl_FragCoord.xy);
  vec4 a=texelFetch(u_i0,c,0),r;
  if(u_mode==0)r=max(a,vec4(0));
  else if(u_mode==1)r=vec4(1)/(vec4(1)+exp(-a));
  else if(u_mode==2)r=clamp(a*u_al+u_be,0.0,1.0);
  else if(u_mode==3){vec4 xa=abs(a);vec4 t=vec4(1)/(vec4(1)+0.3275911*xa);
    r=sign(a)*(vec4(1)-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*exp(-(a*a)));}
  else if(u_mode==4)r=a+u_sc;
  else if(u_mode==5)r=a*u_sc;
  else if(u_mode==6)r=a/u_sc;
  else if(u_mode==7)r=a+texelFetch(u_i1,c,0);
  else if(u_mode==8)r=a*texelFetch(u_i1,c,0);
  else r=a;
  fc=r;
}`;

const FS_AFFINE=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_scale,u_offset;
uniform int u_CG;
out vec4 fc;
void main(){
  int fx=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int cg=fy-fy/u_CG*u_CG;
  fc=texelFetch(u_inp,ivec2(fx,fy),0)*texelFetch(u_scale,ivec2(0,cg),0)+texelFetch(u_offset,ivec2(0,cg),0);
}`;

const FS_CHMUL=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_ch;
uniform int u_CG;
out vec4 fc;
void main(){
  int fy=int(gl_FragCoord.y);
  int cg=fy-fy/u_CG*u_CG;
  fc=texelFetch(u_inp,ivec2(int(gl_FragCoord.x),fy),0)*texelFetch(u_ch,ivec2(0,cg),0);
}`;

const FS_REDUCE=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
uniform int u_iCG,u_iH,u_iW;
out vec4 fc;
void main(){
  int cg=int(gl_FragCoord.y);
  vec4 s=vec4(0);
  for(int y=0;y<u_iH;y++)for(int x=0;x<u_iW;x++)s+=texelFetch(u_inp,ivec2(x,y*u_iCG+cg),0);
  fc=s/float(u_iH*u_iW);
}`;

const FS_POOL=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
uniform int u_iCG,u_oCG,u_iH,u_iW,u_kH,u_kW,u_sH,u_sW,u_pT,u_pL,u_isMax;
out vec4 fc;
void main(){
  int ox=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int oy=fy/u_oCG,cg=fy-oy*u_oCG;
  vec4 r=u_isMax==1?vec4(-1e30):vec4(0);float cnt=0.0;
  for(int ky=0;ky<u_kH;ky++){int iy=oy*u_sH+ky-u_pT;if(iy<0||iy>=u_iH)continue;
  for(int kx=0;kx<u_kW;kx++){int ix=ox*u_sW+kx-u_pL;if(ix<0||ix>=u_iW)continue;
    vec4 v=texelFetch(u_inp,ivec2(ix,iy*u_iCG+cg),0);
    if(u_isMax==1)r=max(r,v);else{r+=v;cnt+=1.0;}
  }}
  fc=u_isMax==1?r:(cnt>0.0?r/cnt:vec4(0));
}`;

const FS_RESIZE=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
uniform int u_iCG,u_sH,u_sW;
out vec4 fc;
void main(){
  int ox=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int oy=fy/u_iCG,cg=fy-oy*u_iCG;
  fc=texelFetch(u_inp,ivec2(ox/u_sW,oy/u_sH*u_iCG+cg),0);
}`;

const FS_CONVTR=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_wt;
uniform int u_iC,u_oC,u_iH,u_iW,u_kH,u_kW,u_sH,u_sW,u_iCG,u_oCG,u_wB,u_wTW;
out vec4 fc;
float rw(int i){i+=u_wB;int t=i>>2,c=i&3;vec4 v=texelFetch(u_wt,ivec2(t%u_wTW,t/u_wTW),0);return c==0?v.r:c==1?v.g:c==2?v.b:v.a;}
void main(){
  int ox=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int oy=fy/u_oCG,ocg=fy-oy*u_oCG,oc0=ocg*4;
  vec4 s=vec4(0);
  for(int ky=0;ky<u_kH;ky++){int iyN=oy-ky;if(iyN<0||iyN%u_sH!=0)continue;int iy=iyN/u_sH;if(iy>=u_iH)continue;
  for(int kx=0;kx<u_kW;kx++){int ixN=ox-kx;if(ixN<0||ixN%u_sW!=0)continue;int ix=ixN/u_sW;if(ix>=u_iW)continue;
    for(int icg=0;icg<u_iCG;icg++){vec4 inp=texelFetch(u_inp,ivec2(ix,iy*u_iCG+icg),0);
    for(int ics=0;ics<4;ics++){int ic=icg*4+ics;if(ic>=u_iC)break;
      float iv=ics==0?inp.r:ics==1?inp.g:ics==2?inp.b:inp.a;
      for(int q=0;q<4;q++){int oc=oc0+q;if(oc>=u_oC)break;
        s[q]+=iv*rw(((ic*u_oC+oc)*u_kH+ky)*u_kW+kx);}
    }}
  }}
  fc=s;
}`;

const FS_CONCAT=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_i0,u_i1,u_i2,u_i3;
uniform int u_c0,u_c1,u_c2,u_c3,u_cg0,u_cg1,u_cg2,u_cg3,u_num,u_oCG;
out vec4 fc;
void main(){
  int fx=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int sy=fy/u_oCG,ocg=fy-sy*u_oCG,oc=ocg*4;
  if(oc<u_c0){fc=texelFetch(u_i0,ivec2(fx,sy*u_cg0+ocg),0);}
  else if(oc<u_c0+u_c1){int lc=oc-u_c0;fc=texelFetch(u_i1,ivec2(fx,sy*u_cg1+(lc>>2)),0);}
  else if(u_num>2&&oc<u_c0+u_c1+u_c2){int lc=oc-u_c0-u_c1;fc=texelFetch(u_i2,ivec2(fx,sy*u_cg2+(lc>>2)),0);}
  else{int lc=oc-u_c0-u_c1-u_c2;fc=texelFetch(u_i3,ivec2(fx,sy*u_cg3+(lc>>2)),0);}
}`;

const FS_CONV1X1=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_wt;
uniform int u_iC,u_iCG,u_oCG,u_sH,u_sW,u_wB,u_wTW;
out vec4 fc;
void main(){
  int ox=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int oy=fy/u_oCG,ocg=fy-oy*u_oCG,oc0=ocg*4;
  int ix=ox*u_sW,iy=oy*u_sH;
  vec4 s=vec4(0);
  for(int icg=0;icg<u_iCG;icg++){
    vec4 inp=texelFetch(u_inp,ivec2(ix,iy*u_iCG+icg),0);
    for(int q=0;q<4;q++){
      int fi=u_wB+(oc0+q)*u_iC+(icg<<2);
      int t=fi>>2;
      s[q]+=dot(inp,texelFetch(u_wt,ivec2(t%u_wTW,t/u_wTW),0));
    }
  }
  fc=s;
}`;

const FS_DW_CONV=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_wt;
uniform int u_C,u_iH,u_iW,u_kH,u_kW,u_sH,u_sW,u_pH,u_pW,u_CG;
out vec4 fc;
void main(){
  int ox=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int oy=fy/u_CG,cg=fy-oy*u_CG;
  vec4 s=vec4(0);
  for(int ky=0;ky<u_kH;ky++){int iy=oy*u_sH+ky-u_pH;if(iy<0||iy>=u_iH)continue;
  for(int kx=0;kx<u_kW;kx++){int ix=ox*u_sW+kx-u_pW;if(ix<0||ix>=u_iW)continue;
    s+=texelFetch(u_inp,ivec2(ix,iy*u_CG+cg),0)*texelFetch(u_wt,ivec2(ky*u_kW+kx,cg),0);
  }}
  fc=s;
}`;

const FS_MATMUL=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_a,u_b;
uniform int u_K,u_KG;
out vec4 fc;
void main(){
  int ox=int(gl_FragCoord.x),m=int(gl_FragCoord.y);
  vec4 s=vec4(0);
  for(int kg=0;kg<u_KG;kg++){
    vec4 a=texelFetch(u_a,ivec2(kg,m),0);
    int k0=kg*4;
    s+=a.r*texelFetch(u_b,ivec2(ox,k0),0);
    s+=a.g*texelFetch(u_b,ivec2(ox,k0+1),0);
    s+=a.b*texelFetch(u_b,ivec2(ox,k0+2),0);
    s+=a.a*texelFetch(u_b,ivec2(ox,k0+3),0);
  }
  fc=s;
}`;

const FS_STD_CONV=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_wt;
uniform int u_iCG,u_oCG,u_iH,u_iW,u_kH,u_kW,u_sH,u_sW,u_pH,u_pW,u_kHW;
out vec4 fc;
void main(){
  int ox=int(gl_FragCoord.x),fy=int(gl_FragCoord.y);
  int oy=fy/u_oCG,ocg=fy-oy*u_oCG,oc0=ocg*4;
  vec4 s=vec4(0);
  for(int ky=0;ky<u_kH;ky++){int iy=oy*u_sH+ky-u_pH;if(iy<0||iy>=u_iH)continue;
  for(int kx=0;kx<u_kW;kx++){int ix=ox*u_sW+kx-u_pW;if(ix<0||ix>=u_iW)continue;
    int wRow=ky*u_kW+kx;
    for(int icg=0;icg<u_iCG;icg++){
      vec4 inp=texelFetch(u_inp,ivec2(ix,iy*u_iCG+icg),0);
      s.r+=dot(inp,texelFetch(u_wt,ivec2(icg,oc0*u_kHW+wRow),0));
      s.g+=dot(inp,texelFetch(u_wt,ivec2(icg,(oc0+1)*u_kHW+wRow),0));
      s.b+=dot(inp,texelFetch(u_wt,ivec2(icg,(oc0+2)*u_kHW+wRow),0));
      s.a+=dot(inp,texelFetch(u_wt,ivec2(icg,(oc0+3)*u_kHW+wRow),0));
    }
  }}
  fc=s;
}`;

const FS_ST_TO_MT=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
uniform int u_W,u_CG;
out vec4 fc;
void main(){
  int cg=int(gl_FragCoord.x),t=int(gl_FragCoord.y);
  int y=t/u_W,x=t-y*u_W;
  fc=texelFetch(u_inp,ivec2(x,y*u_CG+cg),0);
}`;

const FS_MT_TO_ST=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
out vec4 fc;
void main(){
  int x=int(gl_FragCoord.x),cg=int(gl_FragCoord.y);
  fc=texelFetch(u_inp,ivec2(cg,x),0);
}`;

const FS_MT_LAYERNORM=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_gamma,u_beta;
uniform int u_N,u_NG;
uniform float u_eps;
out vec4 fc;
void main(){
  int ng=int(gl_FragCoord.x),m=int(gl_FragCoord.y);
  float sum=0.0;
  for(int g=0;g<u_NG;g++){vec4 v=texelFetch(u_inp,ivec2(g,m),0);int b=g*4;
    sum+=v.r;if(b+1<u_N)sum+=v.g;if(b+2<u_N)sum+=v.b;if(b+3<u_N)sum+=v.a;}
  float mean=sum/float(u_N);
  float vs=0.0;
  for(int g=0;g<u_NG;g++){vec4 v=texelFetch(u_inp,ivec2(g,m),0)-mean;int b=g*4;
    vs+=v.r*v.r;if(b+1<u_N)vs+=v.g*v.g;if(b+2<u_N)vs+=v.b*v.b;if(b+3<u_N)vs+=v.a*v.a;}
  float invStd=1.0/sqrt(vs/float(u_N)+u_eps);
  vec4 inp=texelFetch(u_inp,ivec2(ng,m),0);
  fc=(inp-mean)*invStd*texelFetch(u_gamma,ivec2(ng,0),0)+texelFetch(u_beta,ivec2(ng,0),0);
}`;

const FS_MT_SOFTMAX=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
uniform int u_N,u_NG;
out vec4 fc;
void main(){
  int ng=int(gl_FragCoord.x),m=int(gl_FragCoord.y);
  float mx=-1e30;
  for(int g=0;g<u_NG;g++){vec4 v=texelFetch(u_inp,ivec2(g,m),0);int b=g*4;
    mx=max(mx,v.r);if(b+1<u_N)mx=max(mx,v.g);if(b+2<u_N)mx=max(mx,v.b);if(b+3<u_N)mx=max(mx,v.a);}
  float se=0.0;
  for(int g=0;g<u_NG;g++){vec4 v=texelFetch(u_inp,ivec2(g,m),0);int b=g*4;
    se+=exp(v.r-mx);if(b+1<u_N)se+=exp(v.g-mx);if(b+2<u_N)se+=exp(v.b-mx);if(b+3<u_N)se+=exp(v.a-mx);}
  fc=exp(texelFetch(u_inp,ivec2(ng,m),0)-mx)/se;
}`;

const FS_MT_ADD_BIAS=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp,u_bias;
out vec4 fc;
void main(){ivec2 c=ivec2(gl_FragCoord.xy);fc=texelFetch(u_inp,c,0)+texelFetch(u_bias,ivec2(c.x,0),0);}`;

const FS_MT_QKV_SPLIT=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
uniform int u_T,u_qkvIdx;
out vec4 fc;
void main(){
  int hdg=int(gl_FragCoord.x),ht=int(gl_FragCoord.y);
  int h=ht/u_T,t=ht-h*u_T;
  int col0=u_qkvIdx*192+h*24+hdg*4;
  fc=texelFetch(u_inp,ivec2(col0>>2,t),0);
}`;

const FS_MT_ATTN_SCORE=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_q,u_k;
uniform int u_T,u_DG;
out vec4 fc;
void main(){
  int tg=int(gl_FragCoord.x),bt1=int(gl_FragCoord.y);
  int b=bt1/u_T;
  vec4 s=vec4(0);
  for(int q=0;q<4;q++){int t2=tg*4+q;float d=0.0;
    if(t2<u_T){for(int dg=0;dg<u_DG;dg++){
      vec4 qv=texelFetch(u_q,ivec2(dg,bt1),0);
      vec4 kv=texelFetch(u_k,ivec2(dg,b*u_T+t2),0);
      d+=dot(qv,kv);}}
    s[q]=d;}
  fc=s;
}`;

const FS_MT_BATCHED_MM=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_a,u_b;
uniform int u_M,u_K,u_KG;
out vec4 fc;
void main(){
  int ng=int(gl_FragCoord.x),bm=int(gl_FragCoord.y);
  int b=bm/u_M;
  vec4 s=vec4(0);
  for(int kg=0;kg<u_KG;kg++){
    vec4 a=texelFetch(u_a,ivec2(kg,bm),0);
    int k0=b*u_K+kg*4;
    s+=a.r*texelFetch(u_b,ivec2(ng,k0),0);
    s+=a.g*texelFetch(u_b,ivec2(ng,k0+1),0);
    s+=a.b*texelFetch(u_b,ivec2(ng,k0+2),0);
    s+=a.a*texelFetch(u_b,ivec2(ng,k0+3),0);
  }
  fc=s;
}`;

const FS_MT_HEAD_CONCAT=`#version 300 es
precision highp float;precision highp int;precision highp sampler2D;
uniform sampler2D u_inp;
uniform int u_T;
out vec4 fc;
void main(){
  int ng=int(gl_FragCoord.x),t=int(gl_FragCoord.y);
  int col0=ng*4,h=col0/24,hd0=col0-h*24;
  fc=texelFetch(u_inp,ivec2(hd0>>2,h*u_T+t),0);
}`;

// ============ SHADER COMPILATION ============
function compSh(type,src){
  const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));return null;}
  return s;
}
function mkProg(vsSrc,fsSrc){
  const vs=compSh(gl.VERTEX_SHADER,vsSrc),fs=compSh(gl.FRAGMENT_SHADER,fsSrc);
  const p=gl.createProgram();gl.attachShader(p,vs);gl.attachShader(p,fs);
  gl.bindAttribLocation(p,0,'a_pos');
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));return null;}
  return p;
}

const P={};
P.conv=mkProg(VS,FS_CONV);
P.elem=mkProg(VS,FS_ELEM);
P.affine=mkProg(VS,FS_AFFINE);
P.chmul=mkProg(VS,FS_CHMUL);
P.reduce=mkProg(VS,FS_REDUCE);
P.pool=mkProg(VS,FS_POOL);
P.resize=mkProg(VS,FS_RESIZE);
P.convtr=mkProg(VS,FS_CONVTR);
P.concat=mkProg(VS,FS_CONCAT);
P.matmul=mkProg(VS,FS_MATMUL);
P.conv1x1=mkProg(VS,FS_CONV1X1);
P.dwconv=mkProg(VS,FS_DW_CONV);
P.stdConv=mkProg(VS,FS_STD_CONV);
